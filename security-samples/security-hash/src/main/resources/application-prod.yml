spring:
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 100
      pool-name: "H2TestPool"
      initialization-fail-timeout: -1
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: create-drop

scheduled:
  token-cleanup: ${TOKEN_CLEANUP:24h}      

security:
  https-only: ${HTTPS_ONLY:false} # Set on false when developing
  front:
    csrf: ${CSRF_ENABLED:false}
  tokens:
    base-path: ${KEYS_PATH}
    expiration: ${EXPIRATION_KEY:15m}
    refresh-token: ${REFRESH_KEY:7d}

application:
  size:
    page: ${PAGE_SIZE:20}

settings:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
    max-age: ${CORS_TIME:3600}
  security:
    user: ${ADMIN_USER}
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
