services:
  client-service:
    build:
      context: ../client-reactive
      dockerfile: Dockerfile
    container_name: client-benchmark
    restart: unless-stopped
    ports:
       - "${CLIENT_PORT:-8000}:${CLIENT_PORT:-8000}"
    depends_on:
       - postgres
       - discovery-reactive
       - gateway-reactive
    mem_limit: 256mb
    env_file:
      - .env

  order-service:
    build:
      context: ../order-reactive
      dockerfile: Dockerfile
    container_name: order-benchmark
    restart: unless-stopped
    ports:
       - "${ORDER_PORT:-8001}:${ORDER_PORT:-8001}"
    depends_on:
      - product-service
      - client-service
      - postgres
      - discovery-reactive
      - gateway-reactive
    mem_limit: 256mb
    env_file:
      - .env

  product-service:
    build:
      context: ../product-reactive
      dockerfile: Dockerfile
    container_name: product-benchmark
    restart: unless-stopped
    ports:
       - "${PRODUCT_PORT:-8002}:${PRODUCT_PORT:-8002}"
    depends_on:
       - postgres
       - discovery-reactive
       - gateway-reactive
    mem_limit: 256mb
    env_file:
      - .env

  gateway-reactive:
    build:
      context: ../gateway-reactive
      dockerfile: Dockerfile
    container_name: gateway-benchmark
    restart: unless-stopped
    ports:
       - "${GATEWAY_PORT:-8003}:${GATEWAY_PORT:-8003}"
    depends_on:
       - postgres
       - discovery-reactive
    mem_limit: 256mb
    env_file:
      - .env

  discovery-reactive:
    build:
      context: ../discovery-reactive
      dockerfile: Dockerfile
    container_name: discovery-benchmark
    restart: unless-stopped
    ports:
       - "${DISCOVERY_PORT:-8004}:${DISCOVERY_PORT:-8004}"
    depends_on:
       - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/eureka/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256mb
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: postgres-test
    restart: unless-stopped
    command: >
      postgres
      -c "max_connections=1000"
      -c "shared_buffers=512MB"
      -c "work_mem=16MB"
      -c "effective_cache_size=3GB"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:${DB_PORT}"
    env_file:
      - .env


volumes:
  pgdata:
